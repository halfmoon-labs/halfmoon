services:
  # ─────────────────────────────────────────────
  # HalfMoon Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm halfmoon-agent -m "Hello"
  # ─────────────────────────────────────────────
  halfmoon-agent:
    image: docker.io/halfmoon-labs/halfmoon:latest
    container_name: halfmoon-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.halfmoon
    entrypoint: ["halfmoon", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # HalfMoon Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  halfmoon-gateway:
    image: docker.io/halfmoon-labs/halfmoon:latest
    container_name: halfmoon-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.halfmoon

  # ─────────────────────────────────────────────
  # HalfMoon Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  halfmoon-launcher:
    image: docker.io/halfmoon-labs/halfmoon:launcher
    container_name: halfmoon-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - HALFMOON_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.halfmoon
