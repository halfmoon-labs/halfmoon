services:
  # ─────────────────────────────────────────────
  # HalfMoon Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm halfmoon-agent -m "Hello"
  # ─────────────────────────────────────────────
  halfmoon-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: halfmoon-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.halfmoon/config.json:ro
      - halfmoon-workspace:/root/.halfmoon/workspace
      - halfmoon-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["halfmoon", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # HalfMoon Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  halfmoon-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: halfmoon-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.halfmoon/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - halfmoon-workspace:/root/.halfmoon/workspace
      # NPM cache for faster MCP server installs
      - halfmoon-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  halfmoon-workspace:
  halfmoon-npm-cache: # Cache npm packages to speed up MCP server installations
